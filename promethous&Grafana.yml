
What is Observability?
======================
Here, we will see the concept of Observability, which is a very important aspect for all DevOps Engineers.
Observability refers to the software tools and methodologies that help Dev and Ops teams to log, collect, correlate, 
and analyze massive amounts of performance data from a distributed application and glean real-time
insights. Observability is crucial for maintaining the reliability and availability of software systems. 

It can be divided into three main components, namely:

1. Monitor
2. Logs
3. Alerts

What is Grafana?
====================
Grafana was built on the principle that data should be accessible to everyone in your organization, not just the single Ops person.
By democratizing data, Grafana helps to facilitate a culture where data can easily be used and accessed by the people who need it, helping to break down data silos and empower teams.
With Grafana, you can take any of your existing data, be it from your Kubernetes cluster, Raspberry Pi, different cloud services, or even Google Sheets, and visualize it however you want, all from a single dashboard.

Grafana = Visualization Purpose

What is Prometheus?
===================
Prometheus is an open-source tool for monitoring and alerting systems. It collects and stores metrics over time, and can be used to monitor applications, infrastructure, and more

What is Grafana Loki?
=====================
Loki is a horizontally scalable, highly available, multi-tenant log aggregation solution. It's designed to be both affordable and simple to use. Rather than indexing the contents of the logs, 
It uses a set of labels for each log stream.
Loki is a simple log aggregation tool
Prometheus is a metrics monitoring tool.
Loki's design is inspired by Prometheus, but for logs.

What is Promtail?
=================
Promtail is an agent that ships the logs from the application to Loki. In Simple words, Loki acts as a data source and provides logs to Grafana whereas Promtail captures logs from various sources.

