HELM:
=======
In K8S, Helm is a package manager for installing packages
in RedHat: yum & Ubuntu: apt & K8S: helm

It is used to install applications on clusters.
We can install and deploy applications by using helm
it manages k8s resources and packages through charts
chart is a collection of files organized in a directory structure.
chart is a collection of manifest files.
A running instance of a chart with a specific config is called a release.
The Helm client and library is written in the Go programming language.
The library uses the Kubernetes client library to communicate with Kubernetes.

ARCHITECTURE:
---------------
HEML REPOSITORY: IT HAS ALL HELM REPOS WHICH ARE PUBLICALLY AVAILABLE
HEML CLIENT: DOWNLOADS HELM CHARTS FROM HELM REPOS.
API SERVER: DOWNLOADED HELM CHARTS WILL BE EXECUTED ON THE CLUSTER WITH THE API SERVER.

