ENV VARIABLES:
===============
It is a way to pass configuration information to containers running within pods. To set Env vars, it includes the env or envFrom field in the configuration file. 

ENV: Allows you to set environment variables for a container, specifying a value directly for each variable through CLI/ Command prompt

ENVFROM: PASSING Variables FROM FILE 2 Types, configmaps, and secrets

CONFIGMAPS & SECRETS:
========================

CONFIGMAPS
============
It is used to store the data in key-value pairs, files, or command-line arguments that can be used by pods or containers in a cluster.
But the data should be non-confidential. It does not provide security and encryption
If you want to provide Enryption use Secrets in K8S.

The limit of the configmap is only 1MB

But if you want to store more than 1MB of configmap data mount volume or use a separate database or a file service

-- kubectl create deploy newdb --image=mariadb [This will create a deployment called newdb with a single pod having mariadb]
-- kubectl get pods
-- kubectl logs newdb-794dd57dbc-tr7s9 [It has crashed because we haven't specified the password for MariaDB]
-- kubectl set env deploy newdb MYSQL_ROOT_PASSWORD=root123456
-- kubectl logs newdb-794dd57dbc-tr7s9 [Now it will be running state, but we are passing the password directly from the command]
-- kubectl delete deploy newdb
-- kubectl logs podname [It shows logs of a pod]

Pod State: ImagePullBackOff Error
==============================
When a kubelet starts creating containers for a Pod using a container runtime, it might be possible that the container is in the Waiting state because of ImagePullBackOff.
The status ImagePullBackOff means that a container could not start because Kubernetes could not pull a container image for reasons such as
Invalid image name or
Pulling from a private registry without imagePullSecret.
The BackOff part indicates that Kubernetes will keep trying to pull the image, with an increasing back-off delay.
Kubernetes raises the delay between each attempt until it reaches a compiled-in limit, which is 300 seconds (5 minutes).

Pod State: CrashLoopBackOff Error
=================================
When you see "CrashLoopBackOff," it means that kubelet is trying to run the container, but it keeps failing and crashing. 
After crashing, Kubernetes tries to restart the container automatically, but if the container keeps failing repeatedly, 
You end up in a loop of crashes and restarts, thus the term "CrashLoopBackOff."

Example with ENV:
=================
-- kubectl create deploy newdb --image=mariadb [This will create a deployment called newdb with a single pod having mariadb]
-- kubectl get pods
-- kubectl logs newdb-794dd57dbc-tr7s9 [It has crashed because we haven't specified the password for MariaDB]
-- kubectl set env deploy newdb MYSQL_ROOT_PASSWORD=root123456
-- kubectl logs newdb-794dd57dbc-tr7s9 [Now it will be running state, but we are passing the password directly from the command]
-- kubectl delete deploy newdb
-- kubectl logs podname [It shows logs of a pod]

 Example with ENVFROM: configmaps
 =====================
 -- vi vars
 MYSQL_ROOT_PASSWORD=root123456
 MYSQL_USER=admin
-- kubectl get cm
-- kubectl create cm dbvars --from-env-file=vars
-- kubectl get cm
-- kubectl describe cm dbvars
-- kubectl get pods
-- kubectl set env deploy newdb --from=configmaps/dbvars
-- kubectl get pods
-- kubectl delete deploy newdb

 Example with ENVFROM: secrets
 =============================
 -- kubectl create deploy newdb --image=mariadb
-- kubectl get pods [This will fail because no env variable]

first create secrets 2 ways: from the CLI or from a file
---------------------------------------------------------

-- kubectl create secret generic password--from-literal-ROOT_PASSWORD=reyaz123 (from cli) -- literal meaning direct value
-- kubectl create secret generic my-secret-from-env-file=vars (from file)
-- kubectl get secrets
-- kubectl describe secret my-secret [Name of the secret is my-secret]
-- kubectl set env deploy newdb --from=secrets/my-secret
-- kubectl get pods [This will fail because we have not mentioned the MYSQL_ prefix]
-- kubectl set env deploy newdb --from=secret/my-secret --prefix=MYSQL_
Without passing the prefix, we can't make the pod running status.

TO SEE SECRETS:
================
-- kubectl get secrets my-secret -o yaml

-- echo -n "LKJSKFHJHI" | base64 -d
or
